<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0.5" stdDeviation="0.5" flood-color="#ea580c" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Dark navy circle background -->
  <circle cx="16" cy="16" r="15" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <!-- Glow effect -->
  <ellipse cx="16" cy="13" rx="10" ry="8" fill="url(#glow)"/>
  <!-- Bottom diamond (layer 3) -->
  <polygon points="16,23 24,19 16,15 8,19" fill="url(#g1)" opacity="0.7" filter="url(#shadow)"/>
  <!-- Middle diamond (layer 2) -->
  <polygon points="16,19 24,15 16,11 8,15" fill="url(#g2)" opacity="0.85" filter="url(#shadow)"/>
  <!-- Top diamond (layer 1) -->
  <polygon points="16,15 24,11 16,7 8,11" fill="url(#g2)" filter="url(#shadow)"/>
  <!-- Highlight on top diamond -->
  <polygon points="16,7 24,11 16,15 8,11" fill="url(#glow)" opacity="0.3"/>
</svg>
