# Run Docglow health check as a PR quality gate
#
# Fails the check if the documentation health score drops below the threshold.
# Add this as a required status check in branch protection rules.

name: Documentation Health Check

on:
  pull_request:
    branches: [main]

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docglow
        run: pip install docglow

      - name: Check documentation health
        run: docglow health --project-dir . --fail-under 75
