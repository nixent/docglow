# Deploy dbt documentation to S3 with Docglow
#
# Prerequisites:
#   1. Set AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY as repository secrets
#   2. Create an S3 bucket with static website hosting enabled
#   3. Ensure dbt artifacts are committed or generated in CI

name: Deploy Docs to S3

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  S3_BUCKET: my-dbt-docs-bucket  # Change this to your bucket name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docglow
        run: pip install docglow

      - name: Check documentation health
        run: docglow health --project-dir . --fail-under 70

      - name: Generate documentation site
        run: docglow generate --project-dir . --output-dir site

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: aws s3 sync site/ s3://${{ env.S3_BUCKET }}/ --delete
